<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>化學反應模擬 - 旋轉與座標標註版</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: #1a1a1a; color: #eee;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px;
        }
        .main-container {
            display: flex; gap: 20px; background: #2d2d2d;
            padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        canvas { background-color: #050505; border-radius: 8px; border: 1px solid #444; }
        .controls {
            width: 320px; display: flex; flex-direction: column; gap: 12px;
            background: #222; padding: 20px; border-radius: 10px;
        }
        .control-group { display: flex; flex-direction: column; }
        label { margin-bottom: 4px; font-size: 0.85em; color: #aaa; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #f1c40f; }
        
        .stats {
            display: flex; justify-content: space-around; background: #000;
            padding: 15px; border-radius: 8px; margin-top: 15px;
            font-size: 1.1em; font-weight: bold; border: 1px solid #333;
        }
        .symbol-a { color: #ff4d4d; } .symbol-b { color: #2ecc71; } .symbol-c { color: #4da6ff; }
        .val-display { color: #f1c40f; float: right; font-family: monospace; }
        
        button {
            background: #f1c40f; border: none; padding: 10px; border-radius: 5px;
            font-weight: bold; cursor: pointer; color: #000; margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2 style="color:#f1c40f">可逆反應動態平衡 (分子旋轉與座標標註版)</h2>

    <div class="main-container">
        <div class="canvas-area">
            <canvas id="simCanvas" width="600" height="420"></canvas>
            <div class="stats">
                <div><span class="symbol-a">A</span> + <span class="symbol-b">B</span><span class="symbol-c">C</span> : <span id="countReactants" style="color:white">0</span></div>
                <div style="color: #666;">⇌</div>
                <div><span class="symbol-a">A</span><span class="symbol-b">B</span> + <span class="symbol-c">C</span> : <span id="countProducts" style="color:white">0</span></div>
            </div>
        </div>

        <div class="controls">
            <div style="background:#000; border-radius: 8px; padding: 10px; border: 1px solid #333;">
                <canvas id="energyCanvas" width="280" height="220"></canvas>
            </div>
            
            <div class="control-group">
                <label>A 數量 <span id="numAVal" class="val-display">15</span></label>
                <input type="range" id="numASlider" min="1" max="40" value="15">
            </div>
            <div class="control-group">
                <label>BC 數量 <span id="numBCVal" class="val-display">15</span></label>
                <input type="range" id="numBCSlider" min="1" max="40" value="15">
            </div>
            <div class="control-group">
                <label>系統溫度 <span id="tempVal" class="val-display">5</span></label>
                <input type="range" id="tempSlider" min="1" max="10" step="0.1" value="5">
            </div>
            <div class="control-group">
                <label>活化能 (Ea) <span id="eaVal" class="val-display">100</span></label>
                <input type="range" id="eaSlider" min="10" max="180" value="100">
            </div>
            <div class="control-group">
                <label>反應熱 (ΔH) <span id="dhVal" class="val-display">0</span></label>
                <input type="range" id="dhSlider" min="-80" max="80" value="0">
            </div>
            <button id="resetBtn">重新開始</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const eCanvas = document.getElementById('energyCanvas');
    const eCtx = eCanvas.getContext('2d');

    let config = {
        temp: 5, Ea: 100, productPE: 0, 
        numA: 15, numBC: 15
    };

    const RADIUS = { A: 11, B: 7, C: 15 };
    const COLORS = { A: '#ff4d4d', B: '#2ecc71', C: '#4da6ff' };

    class Molecule {
        constructor(x, y, atomsTypes) {
            this.x = x; this.y = y;
            this.atoms = atomsTypes; 
            let angle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(angle) * config.temp;
            this.vy = Math.sin(angle) * config.temp;
            
            // 新增旋轉屬性
            this.angle = Math.random() * Math.PI * 2; // 當前旋轉角度
            this.omega = (Math.random() - 0.5) * 0.15; // 角速度 (旋轉快慢)
            
            this.updateOffsets();
        }

        updateOffsets() {
            if (this.atoms.length === 1) {
                this.offsets = [{x: 0, y: 0}];
                this.radius = RADIUS[this.atoms[0]];
            } else {
                let r1 = RADIUS[this.atoms[0]], r2 = RADIUS[this.atoms[1]];
                let dist = r1 + r2 - 3;
                this.offsets = [{x: -dist/2, y: 0}, {x: dist/2, y: 0}];
                this.radius = (r1 + r2 + dist) / 2 - 1;
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle); // 套用旋轉

            this.atoms.forEach((type, i) => {
                let ax = this.offsets[i].x;
                let ay = this.offsets[i].y;
                ctx.beginPath(); ctx.arc(ax, ay, RADIUS[type], 0, Math.PI * 2);
                ctx.fillStyle = COLORS[type]; ctx.fill();
                ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke();
            });
            ctx.restore();
        }

        update() {
            this.x += this.vx; this.y += this.vy;
            this.angle += this.omega; // 更新旋轉角度

            if (this.x < 30 || this.x > canvas.width - 30) this.vx *= -1;
            if (this.y < 30 || this.y > canvas.height - 30) this.vy *= -1;
            this.x = Math.max(30, Math.min(canvas.width - 30, this.x));
            this.y = Math.max(30, Math.min(canvas.height - 30, this.y));
        }
    }

    let molecules = [];

    function initSim() {
        molecules = [];
        for (let i = 0; i < config.numA; i++) molecules.push(new Molecule(Math.random()*540+30, Math.random()*360+30, ['A']));
        for (let i = 0; i < config.numBC; i++) molecules.push(new Molecule(Math.random()*540+30, Math.random()*360+30, ['B', 'C']));
    }

    function applyThermostat() {
        molecules.forEach(m => {
            let currentSpd = Math.sqrt(m.vx * m.vx + m.vy * m.vy);
            if (currentSpd !== 0) {
                let scale = config.temp / currentSpd;
                m.vx *= scale; m.vy *= scale;
            }
        });
    }

    function handleCollisions() {
        for (let i = 0; i < molecules.length; i++) {
            for (let j = i + 1; j < molecules.length; j++) {
                let m1 = molecules[i], m2 = molecules[j];
                let dx = m2.x - m1.x, dy = m2.y - m1.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let minDist = m1.radius + m2.radius;

                if (dist < minDist) {
                    let overlap = minDist - dist;
                    let nx = dx / dist, ny = dy / dist;
                    m1.x -= nx * overlap / 2; m1.y -= ny * overlap / 2;
                    m2.x += nx * overlap / 2; m2.y += ny * overlap / 2;

                    let rvx = m1.vx - m2.vx, rvy = m1.vy - m2.vy;
                    let relKE = (rvx*rvx + rvy*rvy) * 10; 

                    let s1 = m1.atoms.join(''), s2 = m2.atoms.join('');
                    let reacted = false;

                    if ((s1 === 'A' && s2 === 'BC') || (s1 === 'BC' && s2 === 'A')) {
                        if (relKE > config.Ea) {
                            m1.atoms = (s1 === 'A') ? ['A','B'] : ['C'];
                            m2.atoms = (s2 === 'BC') ? ['C'] : ['A','B'];
                            reacted = true;
                        }
                    } else if ((s1 === 'AB' && s2 === 'C') || (s1 === 'C' && s2 === 'AB')) {
                        if (relKE > (config.Ea - config.productPE)) {
                            m1.atoms = (s1 === 'AB') ? ['A'] : ['B','C'];
                            m2.atoms = (s2 === 'C') ? ['B','C'] : ['A'];
                            reacted = true;
                        }
                    }

                    if (reacted) {
                        m1.updateOffsets(); m2.updateOffsets();
                        // 反應後隨機改變角速度
                        m1.omega = (Math.random() - 0.5) * 0.2;
                        m2.omega = (Math.random() - 0.5) * 0.2;
                    } else {
                        let p = (m1.vx * nx + m1.vy * ny - m2.vx * nx - m2.vy * ny);
                        m1.vx -= p * nx; m1.vy -= p * ny;
                        m2.vx += p * nx; m2.vy += p * ny;
                    }
                }
            }
        }
    }

    function drawEnergyDiagram() {
        eCtx.clearRect(0, 0, eCanvas.width, eCanvas.height);
        eCtx.fillStyle = "#000"; eCtx.fillRect(0, 0, eCanvas.width, eCanvas.height);
        
        const offsetX = 45; // 留給 Y 軸標題的空間
        const ground = 120; const startX = offsetX + 20, peakX = offsetX + 100, endX = offsetX + 180;
        const peakY = ground - config.Ea; const finalY = ground - config.productPE;

        // 繪製座標軸
        eCtx.strokeStyle = "#888"; eCtx.lineWidth = 1; eCtx.beginPath();
        eCtx.moveTo(offsetX, 20); eCtx.lineTo(offsetX, 190); eCtx.lineTo(270, 190); eCtx.stroke();

        // 座標軸標題
        eCtx.fillStyle = "#aaa"; eCtx.font = "12px Arial";
        // Y 軸標題 (旋轉 90 度)
        eCtx.save();
        eCtx.translate(15, 105);
        eCtx.rotate(-Math.PI / 2);
        eCtx.textAlign = "center";
        eCtx.fillText("位能 (PE)", 0, 0);
        eCtx.restore();
        // X 軸標題
        eCtx.textAlign = "center";
        eCtx.fillText("反應路徑", 160, 210);

        // 基準線
        eCtx.setLineDash([4, 4]); eCtx.strokeStyle = "#333";
        eCtx.beginPath(); eCtx.moveTo(startX, ground); eCtx.lineTo(endX, ground);
        eCtx.moveTo(endX, finalY); eCtx.lineTo(startX, finalY); eCtx.stroke(); eCtx.setLineDash([]);

        // 反應曲線
        eCtx.lineWidth = 3; eCtx.strokeStyle = "#f1c40f";
        eCtx.beginPath(); eCtx.moveTo(startX, ground);
        eCtx.bezierCurveTo(peakX-40, ground, peakX-20, peakY, peakX, peakY); eCtx.stroke();
        eCtx.strokeStyle = "#2ecc71";
        eCtx.beginPath(); eCtx.moveTo(peakX, peakY);
        eCtx.bezierCurveTo(peakX+20, peakY, peakX+40, finalY, endX, finalY); eCtx.stroke();

        // 能量球 (固定位置)
        let energyLevel = (config.temp * config.temp) * 2; 
        let ballY = ground - energyLevel; 
        eCtx.fillStyle = "#fff";
        eCtx.shadowBlur = 10; eCtx.shadowColor = "white";
        eCtx.beginPath(); eCtx.arc(peakX, ballY, 6, 0, Math.PI*2); eCtx.fill();
        eCtx.shadowBlur = 0;

        // 標記反應物與產物文字
        eCtx.fillStyle = "#fff"; eCtx.font = "bold 10px Arial";
        eCtx.fillText("A+BC", startX, ground + 15);
        eCtx.fillText("AB+C", endX, finalY + 15);
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        handleCollisions();
        applyThermostat();
        let rCount = 0, pCount = 0;
        molecules.forEach(m => {
            m.update(); m.draw();
            let s = m.atoms.join('');
            if (s === 'A' || s === 'BC') rCount += 0.5;
            if (s === 'C' || s === 'AB') pCount += 0.5;
        });
        document.getElementById('countReactants').textContent = Math.floor(rCount);
        document.getElementById('countProducts').textContent = Math.floor(pCount);
        drawEnergyDiagram();
        requestAnimationFrame(animate);
    }

    const setup = (id, key, valId, isReinit = false) => {
        document.getElementById(id).addEventListener('input', (e) => {
            config[key] = parseFloat(e.target.value);
            document.getElementById(valId).textContent = e.target.value;
            if(isReinit) initSim();
        });
    };

    setup('tempSlider', 'temp', 'tempVal');
    setup('eaSlider', 'Ea', 'eaVal');
    setup('dhSlider', 'productPE', 'dhVal');
    setup('numASlider', 'numA', 'numAVal', true);
    setup('numBCSlider', 'numBC', 'numBCVal', true);
    document.getElementById('resetBtn').onclick = () => initSim();

    initSim();
    animate();
</script>
</body>
</html>
