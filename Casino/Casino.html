<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JavaScript 抽籤模擬器 - 魔術版</title>
    <style>
        :root {
            --primary-green: #00FF00;
            --btn-gray: #D3D3D3;
            --btn-red: #FF0000;
            --btn-yellow: #FFFF00;
        }

        body {
            font-family: 'Monospaced', monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        .header {
            background: #eee;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            border-bottom: 2px solid #ccc;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #button-grid {
            flex: 1;
            display: grid;
            gap: 2px; 
            padding: 5px;
            overflow-y: auto;
            align-content: start; 
            background-color: #ccc;
        }

        .num-btn {
            aspect-ratio: 1;
            font-size: clamp(14px, 2vw, 24px);
            font-weight: bold;
            border: none;
            cursor: pointer;
            background-color: var(--btn-gray);
            transition: background 0.1s;
        }

        .num-btn.excluded { background-color: var(--btn-red); color: white; }
        .num-btn.active { background-color: var(--btn-yellow); color: black; }

        .sidebar {
            width: 220px;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            border-left: 2px solid #ccc;
            background: #fafafa;
        }

        .ctrl-btn {
            font-size: 24px;
            font-weight: bold;
            padding: 15px;
            background-color: var(--primary-green);
            border: 2px solid #000;
            cursor: pointer;
        }

        #canvas-area {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid #333;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
        }

        #display-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

<div class="header">
    <label>N: <input type="number" id="inputN" value="33" style="width: 50px;"></label>
    <label>跳動次數: <input type="range" id="inputCount" min="1" max="100" value="20"> <span id="countVal">20</span></label>
    <label>初始延遲: <input type="range" id="inputSpeed" min="10" max="500" value="50" step="10"> <span id="speedVal">50</span>ms</label>
</div>

<div class="main-container">
    <div id="button-grid"></div>
    <div class="sidebar">
        <button class="ctrl-btn" onclick="startDraw()">START</button>
        <button class="ctrl-btn" style="background-color: #ffcccc;" onclick="resetGrid(true)">NONE</button>
        <button class="ctrl-btn" style="background-color: #ccffcc;" onclick="resetGrid(false)">ALL</button>
        <div id="canvas-area"><img id="display-img" src="" alt="圖片區"></div>
    </div>
</div>

<script>
    let N = 33;
    let yellowIndex = -1;
    let secretBuffer = ""; // 隱藏的數字儲存區
    
    const grid = document.getElementById('button-grid');
    const imgDisplay = document.getElementById('display-img');
    const inputN = document.getElementById('inputN');
    const inputCount = document.getElementById('inputCount');
    const inputSpeed = document.getElementById('inputSpeed');

    // 1. 隱形鍵盤監聽器
    window.addEventListener('keydown', (e) => {
        // 如果按的是數字鍵 (0-9)
        if (e.key >= '0' && e.key <= '9') {
            secretBuffer += e.key;
            // console.log("隱形輸入中..."); // 偵錯用，發布時可註解掉
        }
        // 如果按 Backspace 或 Escape 則清空隱形輸入
        if (e.key === 'Backspace' || e.key === 'Escape') {
            secretBuffer = "";
        }
    });

    function initGrid() {
        grid.innerHTML = '';
        N = parseInt(inputN.value) || 1;
        const cols = Math.ceil(Math.sqrt(N));
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        for (let i = 1; i <= N; i++) {
            const btn = document.createElement('button');
            btn.innerText = i;
            btn.id = `btn-${i}`;
            btn.className = 'num-btn';
            btn.onclick = () => toggleBtn(btn);
            grid.appendChild(btn);
        }
    }

    function toggleBtn(btn) { btn.classList.toggle('excluded'); }

    function resetGrid(toRed) {
        document.querySelectorAll('.num-btn').forEach(btn => {
            btn.classList.remove('active');
            if (toRed) btn.classList.add('excluded');
            else btn.classList.remove('excluded');
        });
        yellowIndex = -1;
        secretBuffer = ""; // 重設時也清空隱形號碼
    }

    async function startDraw() {
        const maxJumps = parseInt(inputCount.value);
        const baseDelay = parseInt(inputSpeed.value);
        
        // 2. 處理預設號碼
        let forcedNumber = null;
        if (secretBuffer !== "") {
            let num = parseInt(secretBuffer);
            // 檢查號碼是否在合法範圍內
            if (num > 0 && num <= N) {
                forcedNumber = num;
            }
            secretBuffer = ""; // 使用過後立即清空，下次需重新輸入
        }

        let sample = [];
        for (let i = 1; i <= N; i++) {
            if (!document.getElementById(`btn-${i}`).classList.contains('excluded')) {
                sample.push(i);
            }
        }
        if (sample.length === 0) return alert("請保留灰色號碼！");

        let a = [...sample];
        // 洗牌
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }

        let jumpCount = 0;
        while (jumpCount < maxJumps) {
            if (yellowIndex !== -1) {
                document.getElementById(`btn-${yellowIndex}`).classList.remove('active');
            }

            // 3. 決定號碼邏輯
            let currentIndex;
            if (jumpCount === maxJumps - 1 && forcedNumber !== null) {
                // 如果是最後一跳且有預設號碼，強制選中它
                currentIndex = forcedNumber;
            } else {
                currentIndex = a[jumpCount % a.length];
            }

            const currentBtn = document.getElementById(`btn-${currentIndex}`);
            currentBtn.classList.add('active');
            yellowIndex = currentIndex;
            updateImage(currentIndex);

            let currentDelay = baseDelay + (jumpCount * (baseDelay * 0.2));
            await new Promise(r => setTimeout(r, currentDelay));
            
            if (jumpCount < maxJumps - 1) {
                currentBtn.classList.remove('active');
            } else {
                currentBtn.classList.remove('active');
                currentBtn.classList.add('excluded');
            }
            jumpCount++;
        }
    }

    function updateImage(index) {
        imgDisplay.src = `${index}.jpg`;
        imgDisplay.onerror = () => { imgDisplay.alt = `No Img ${index}`; imgDisplay.src = ""; };
    }

    inputN.addEventListener('keypress', (e) => { if (e.key === 'Enter') initGrid(); });
    inputCount.oninput = () => document.getElementById('countVal').innerText = inputCount.value;
    inputSpeed.oninput = () => document.getElementById('speedVal').innerText = inputSpeed.value;

    initGrid();
</script>
</body>
</html>
