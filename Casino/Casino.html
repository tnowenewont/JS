<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>JavaScript 抽籤模擬器</title>
    <style>
        :root {
            --primary-green: #00FF00;
            --btn-gray: #D3D3D3;
            --btn-red: #FF0000;
            --btn-yellow: #FFFF00;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Monospaced', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            /* 動態視窗高度，支援移動端 */
            margin: 0;
            background-color: #f0f0f0;
            overflow: hidden;
            /* 防止 body 層級出現滾動條 */
        }

        .header {
            background: #eee;
            padding: 12px 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px 20px;
            align-items: center;
            border-bottom: 2px solid #ccc;
            flex-shrink: 0;
            /* 不允許 header 被壓縮 */;
        }

        .header label {
            white-space: nowrap;
            font-size: 14px;
        }

        .header input[type="number"] {
            width: 55px;
            font-size: 14px;
            padding: 3px 5px;
        }

        .header input[type="range"] {
            width: 100px;
            vertical-align: middle;
        }

        .main-container {
            display: flex;
            flex: 1;
            min-height: 0;
            /* 關鍵：允許 flex 子元素正確收縮 */;
            overflow: hidden;
        }

        #button-grid {
            flex: 1;
            min-width: 0;
            /* 防止 flex 子元素撐開 */;
            display: grid;
            gap: 2px;
            padding: 5px;
            overflow: hidden;
            /* 不再需要捲軸 */;
            align-content: center;
            /* 格子在垂直方向居中 */;
            justify-content: center;
            /* 格子在水平方向居中 */;
            background-color: #ccc;
        }

        .num-btn {
            aspect-ratio: 1;
            font-size: clamp(12px, 1.8vw, 22px);
            font-weight: bold;
            border: none;
            cursor: pointer;
            background-color: var(--btn-gray);
            transition: background 0.1s;
            border-radius: 3px;
            /* 微圓角更現代 */;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
            /* 允許縮小 */;
            min-height: 0;
            user-select: none;
            /* 防止快速點擊時選中文字 */;
            -webkit-tap-highlight-color: transparent;
            /* 移除手機點擊高亮 */;
        }

        .num-btn:hover {
            filter: brightness(0.9);
        }
        .num-btn:active {
            filter: brightness(0.75);
            transform: scale(0.95);
        }

        .num-btn.excluded {
            background-color: var(--btn-red);
            color: white;
        }
        .num-btn.active {
            background-color: var(--btn-yellow);
            color: black;
            box-shadow: 0 0 12px 4px rgba(255, 255, 0, 0.7);
            z-index: 2;
            transform: scale(1.05);
            transition: transform 0.08s, box-shadow 0.08s;
        }

        .sidebar {
            width: 220px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            border-left: 2px solid #ccc;
            background: #fafafa;
            overflow-y: auto;
            /* sidebar 內部可滾動 */;
        }

        .ctrl-btn {
            font-size: 22px;
            font-weight: bold;
            padding: 14px 10px;
            background-color: var(--primary-green);
            border: 2px solid #000;
            cursor: pointer;
            border-radius: 6px;
            transition: filter 0.1s, transform 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:hover {
            filter: brightness(0.85);
        }
        .ctrl-btn:active {
            transform: scale(0.96);
        }

        #canvas-area {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid #333;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
        }

        #display-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* 響應式：窄螢幕時 sidebar 變窄 */
        @media (max-width: 600px) {
            .sidebar {
                width: 140px;
                padding: 6px;
                gap: 6px;
            }
            .ctrl-btn {
                font-size: 16px;
                padding: 10px 6px;
            }
            .header {
                padding: 8px 10px;
                gap: 8px 12px;
            }
            .header label {
                font-size: 12px;
            }
            .header input[type="range"] {
                width: 70px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <label>N: <input type="number" id="inputN" value="33" min="1" max="500" style="width: 55px;"></label>
        <label>跳動次數: <input type="range" id="inputCount" min="1" max="100" value="20"> <span id="countVal">20</span></label>
        <label>初始延遲: <input type="range" id="inputSpeed" min="10" max="500" value="50" step="10"> <span id="speedVal">50</span>ms</label>
    </div>

    <div class="main-container">
        <div id="button-grid"></div>
        <div class="sidebar">
            <button class="ctrl-btn" onclick="startDraw()">START</button>
            <button class="ctrl-btn" style="background-color: #ffcccc;" onclick="resetGrid(true)">NONE</button>
            <button class="ctrl-btn" style="background-color: #ccffcc;" onclick="resetGrid(false)">ALL</button>
            <div id="canvas-area"><img id="display-img" src="" alt="圖片區"></div>
        </div>
    </div>

    <script>
        (function() {
            // ============ DOM 引用 ============
            const grid = document.getElementById('button-grid');
            const imgDisplay = document.getElementById('display-img');
            const inputN = document.getElementById('inputN');
            const inputCount = document.getElementById('inputCount');
            const inputSpeed = document.getElementById('inputSpeed');
            const countValSpan = document.getElementById('countVal');
            const speedValSpan = document.getElementById('speedVal');

            // ============ 狀態變數 ============
            let N = 33;
            let yellowIndex = -1;
            let secretBuffer = ''; // 隱藏的數字儲存區
            let isDrawing = false; // 防止抽籤過程中重複觸發
            let currentOptimalCols = null; // 記錄當前最優列數

            // ============ 常數（與 CSS 保持同步）============
            const GRID_PADDING = 5; // px，對應 #button-grid 的 padding
            const GRID_GAP = 2; // px，對應 #button-grid 的 gap

            // ============ 隱形鍵盤監聽器 ============
            window.addEventListener('keydown', (e) => {
                if (e.key >= '0' && e.key <= '9') {
                    secretBuffer += e.key;
                }
                if (e.key === 'Backspace' || e.key === 'Escape') {
                    secretBuffer = '';
                }
            });

            // ============ 計算最優網格佈局 ============
            function calculateOptimalCols(totalItems, containerWidth, containerHeight) {
                const contentW = containerWidth - GRID_PADDING * 2;
                const contentH = containerHeight - GRID_PADDING * 2;

                // 如果容器尺寸無效，回退到 sqrt 估算
                if (contentW <= 0 || contentH <= 0 || totalItems <= 0) {
                    return Math.ceil(Math.sqrt(totalItems));
                }

                let bestCols = 1;
                let bestCellSize = -1;

                // 遍歷所有可能的列數
                for (let cols = 1; cols <= totalItems; cols++) {
                    const rows = Math.ceil(totalItems / cols);

                    // 計算在此列數下的格子邊長（width 方向）
                    const cellWidth = (contentW - (cols - 1) * GRID_GAP) / cols;

                    // 計算所需總高度
                    const totalHeightNeeded = rows * cellWidth + (rows - 1) * GRID_GAP;

                    // 檢查是否在容器高度內
                    if (totalHeightNeeded <= contentH) {
                        // 可行解，記錄格子大小
                        if (cellWidth > bestCellSize) {
                            bestCellSize = cellWidth;
                            bestCols = cols;
                        }
                    }
                }

                // 理論上至少 cols=totalItems 時一定可行（單行）
                // 如果 bestCellSize 仍為 -1，表示迴圈中沒有找到可行解（不應發生）
                if (bestCellSize <= 0) {
                    // fallback：選擇使總高度最小的列數
                    let minHeight = Infinity;
                    for (let cols = 1; cols <= totalItems; cols++) {
                        const rows = Math.ceil(totalItems / cols);
                        const cellWidth = (contentW - (cols - 1) * GRID_GAP) / cols;
                        const totalH = rows * cellWidth + (rows - 1) * GRID_GAP;
                        if (totalH < minHeight) {
                            minHeight = totalH;
                            bestCols = cols;
                        }
                    }
                }

                return bestCols;
            }

            function applyGridLayout() {
                if (isDrawing) return; // 抽籤過程中不調整佈局

                const containerWidth = grid.clientWidth;
                const containerHeight = grid.clientHeight;

                if (containerWidth <= 0 || containerHeight <= 0 || N <= 0) {
                    // 容器尚未就緒，使用 sqrt 估算
                    const fallbackCols = Math.ceil(Math.sqrt(N));
                    grid.style.gridTemplateColumns = `repeat(${fallbackCols}, 1fr)`;
                    currentOptimalCols = fallbackCols;
                    return;
                }

                const optimalCols = calculateOptimalCols(N, containerWidth, containerHeight);
                grid.style.gridTemplateColumns = `repeat(${optimalCols}, 1fr)`;
                currentOptimalCols = optimalCols;
            }

            // ============ 初始化網格 ============
            function initGrid() {
                grid.innerHTML = '';
                N = parseInt(inputN.value) || 1;
                if (N < 1) N = 1;
                if (N > 500) N = 500; // 限制最大值，避免過度渲染
                inputN.value = N;

                // 先用 sqrt 估算設定初始列數，避免閃爍
                const initialCols = Math.ceil(Math.sqrt(N));
                grid.style.gridTemplateColumns = `repeat(${initialCols}, 1fr)`;
                currentOptimalCols = initialCols;

                // 批量創建按鈕（使用 DocumentFragment 提升效能）
                const fragment = document.createDocumentFragment();
                for (let i = 1; i <= N; i++) {
                    const btn = document.createElement('button');
                    btn.innerText = i;
                    btn.id = `btn-${i}`;
                    btn.className = 'num-btn';
                    btn.setAttribute('aria-label', `號碼 ${i}`);
                    btn.onclick = () => toggleBtn(btn);
                    fragment.appendChild(btn);
                }
                grid.appendChild(fragment);

                // 延遲執行精確佈局計算（等待 DOM 更新與渲染）
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        applyGridLayout();
                    });
                });
            }

            // ============ 切換按鈕排除狀態 ============
            function toggleBtn(btn) {
                if (isDrawing) return; // 抽籤中不允許切換
                btn.classList.toggle('excluded');
            }

            // ============ 重設網格 ============
            function resetGrid(toRed) {
                if (isDrawing) return;
                const allBtns = document.querySelectorAll('.num-btn');
                allBtns.forEach(btn => {
                    btn.classList.remove('active');
                    if (toRed) {
                        btn.classList.add('excluded');
                    } else {
                        btn.classList.remove('excluded');
                    }
                });
                yellowIndex = -1;
                secretBuffer = '';
            }

            // ============ 開始抽籤 ============
            async function startDraw() {
                if (isDrawing) return; // 防止重複點擊
                isDrawing = true;

                try {
                    const maxJumps = parseInt(inputCount.value) || 20;
                    const baseDelay = parseInt(inputSpeed.value) || 50;

                    // 處理預設號碼（隱形鍵盤輸入）
                    let forcedNumber = null;
                    if (secretBuffer !== '') {
                        const num = parseInt(secretBuffer);
                        if (num > 0 && num <= N) {
                            forcedNumber = num;
                        }
                        secretBuffer = '';
                    }

                    // 收集未被排除的號碼
                    let sample = [];
                    for (let i = 1; i <= N; i++) {
                        const btn = document.getElementById(`btn-${i}`);
                        if (btn && !btn.classList.contains('excluded')) {
                            sample.push(i);
                        }
                    }

                    if (sample.length === 0) {
                        alert('請保留至少一個灰色號碼！');
                        isDrawing = false;
                        return;
                    }

                    // Fisher-Yates 洗牌
                    let a = [...sample];
                    for (let i = a.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [a[i], a[j]] = [a[j], a[i]];
                    }

                    let jumpCount = 0;
                    while (jumpCount < maxJumps) {
                        // 移除上一個高亮
                        if (yellowIndex !== -1) {
                            const prevBtn = document.getElementById(`btn-${yellowIndex}`);
                            if (prevBtn) prevBtn.classList.remove('active');
                        }

                        // 決定當前號碼
                        let currentIndex;
                        if (jumpCount === maxJumps - 1 && forcedNumber !== null) {
                            // 最後一跳：使用預設號碼（如果存在於 sample 中）
                            if (sample.includes(forcedNumber)) {
                                currentIndex = forcedNumber;
                            } else {
                                // 預設號碼已被排除，回退到正常隨機
                                currentIndex = a[jumpCount % a.length];
                            }
                        } else {
                            currentIndex = a[jumpCount % a.length];
                        }

                        const currentBtn = document.getElementById(`btn-${currentIndex}`);
                        if (!currentBtn) {
                            // 按鈕不存在（極端情況），跳出
                            break;
                        }

                        currentBtn.classList.add('active');
                        yellowIndex = currentIndex;
                        updateImage(currentIndex);

                        // 計算漸增延遲
                        const currentDelay = baseDelay + (jumpCount * (baseDelay * 0.2));
                        await new Promise(r => setTimeout(r, currentDelay));

                        // 最後一跳：標記為排除（紅色）
                        if (jumpCount === maxJumps - 1) {
                            currentBtn.classList.remove('active');
                            currentBtn.classList.add('excluded');
                            yellowIndex = -1;
                        } else {
                            currentBtn.classList.remove('active');
                        }

                        jumpCount++;
                    }
                } finally {
                    isDrawing = false;
                }
            }

            // ============ 更新圖片 ============
            function updateImage(index) {
                imgDisplay.src = `${index}.jpg`;
                imgDisplay.onerror = () => {
                    imgDisplay.alt = `No Img ${index}`;
                    imgDisplay.src = '';
                };
                // 清除之前的 onerror，避免重複觸發
                imgDisplay.onload = () => {
                    imgDisplay.alt = `號碼 ${index} 圖片`;
                };
            }

            // ============ 事件監聽 ============
            // N 輸入：按 Enter 觸發重設
            inputN.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    initGrid();
                    secretBuffer = '';
                }
            });
            // 失去焦點時也觸發（方便使用上下箭頭調整數值）
            inputN.addEventListener('change', () => {
                initGrid();
                secretBuffer = '';
            });

            // 滑桿即時更新顯示值
            inputCount.oninput = () => {
                countValSpan.innerText = inputCount.value;
            };
            inputSpeed.oninput = () => {
                speedValSpan.innerText = inputSpeed.value;
            };

            // ResizeObserver：監聽 grid 容器大小變化，自動調整佈局
            const resizeObserver = new ResizeObserver((entries) => {
                // 使用 requestAnimationFrame 避免過度頻繁的重新計算
                if (window._gridResizeRAF) {
                    cancelAnimationFrame(window._gridResizeRAF);
                }
                window._gridResizeRAF = requestAnimationFrame(() => {
                    applyGridLayout();
                });
            });
            resizeObserver.observe(grid);

            // 備份：window resize 監聽（處理某些極端情況）
            let windowResizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(windowResizeTimer);
                windowResizeTimer = setTimeout(() => {
                    applyGridLayout();
                }, 150);
            });

            // ============ 暴露全域函數 ============
            window.startDraw = startDraw;
            window.resetGrid = resetGrid;

            // ============ 初始啟動 ============
            initGrid();

            // 頁面完全加載後再微調一次佈局
            window.addEventListener('load', () => {
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        applyGridLayout();
                    });
                });
            });

            console.log('✅ 抽籤模擬器已就緒');
            console.log('   💡 提示：在頁面任意位置直接按數字鍵（0-9）可預設號碼');
            console.log('   💡 按下 Backspace 或 Escape 可清除預設號碼');
            console.log('   📐 網格會自動調整大小以適應視窗，無需滾動');
        })();
    </script>
</body>
</html>
